<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Time" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" sizes="180x180" href="./time.png" />
  <title>Time Trick</title>
  <style>
    :root {
      --fg: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.86);
      --glass-border: rgba(255,255,255,0.22);
      --shadow: 0 16px 40px rgba(0,0,0,0.28);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --time-size: 132px;
      --time-offset: 96px;
      --app-height: 100dvh;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      scrollbar-width: none;
    }
    *::-webkit-scrollbar { width: 0; height: 0; display: none; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000 !important;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      background: #000 !important;
    }

    .phone {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--app-height);
      min-height: var(--app-height);
      overflow: hidden;
      background-color: #000;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,180,60,0.16), transparent 34%),
        linear-gradient(to bottom, rgba(0,0,0,0.12), rgba(0,0,0,0.26) 40%, rgba(0,0,0,0.18) 72%, rgba(0,0,0,0.34));
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 10px) 22px 0 22px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.28);
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .signal {
      display: inline-flex;
      align-items: end;
      gap: 2px;
      height: 14px;
    }

    .signal span {
      width: 4px;
      background: #fff;
      border-radius: 2px;
    }
    .signal span:nth-child(1) { height: 5px; }
    .signal span:nth-child(2) { height: 8px; }
    .signal span:nth-child(3) { height: 11px; }
    .signal span:nth-child(4) { height: 14px; }

    .battery {
      position: relative;
      width: 42px;
      height: 22px;
      border-radius: 7px;
      background: #f2cf2f;
      color: #000;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
    }
    .battery::after {
      content: "";
      position: absolute;
      right: -3px;
      top: 6px;
      width: 3px;
      height: 10px;
      background: rgba(255,255,255,0.9);
      border-radius: 0 3px 3px 0;
    }

    .top-indicator {
      position: absolute;
      top: calc(var(--safe-top) + 38px);
      right: 20px;
      width: 88px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.52);
      z-index: 3;
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: var(--time-offset);
      color: #fff;
      text-shadow: 0 3px 14px rgba(0,0,0,0.22);
    }

    .date {
      font-size: clamp(18px, 4.8vw, 24px);
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 10px;
      padding: 0 18px;
    }

    .time {
      font-size: var(--time-size);
      line-height: 0.95;
      letter-spacing: -3px;
      transition: opacity 0.18s ease;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .hint.show { opacity: 1; }

    .bottom-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(var(--safe-bottom) + 18px);
      z-index: 4;
      padding: 0 26px;
      display: flex;
      justify-content: space-between;
      align-items: end;
    }

    .glass-btn {
      width: 74px;
      height: 74px;
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.09));
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.16), var(--shadow);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.95);
      cursor: pointer;
      padding: 0;
      outline: none;
    }
    .glass-btn svg {
      width: 34px;
      height: 34px;
      fill: currentColor;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      width: 135px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      z-index: 4;
    }

    .sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.22);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .sheet-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: absolute;
      z-index: 11;
      color: #fff;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(180deg, rgba(28,28,28,0.68), rgba(18,18,18,0.8));
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.38);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s linear 0.18s;
    }
    .sheet.show {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s linear 0s;
    }

    #numpadSheet {
      width: 220px;
      left: 24px;
      bottom: calc(var(--safe-bottom) + 112px);
      padding: 10px;
      transform: translateY(12px) scale(0.98);
    }
    #numpadSheet.show {
      transform: translateY(0) scale(1);
    }

    #settingsSheet {
      width: min(360px, calc(100vw - 28px));
      left: 50%;
      bottom: calc(var(--safe-bottom) + 92px);
      padding: 12px 12px 14px;
      transform: translateX(-50%) translateY(12px) scale(0.98);
    }
    #settingsSheet.show {
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .grabber {
      width: 46px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.35);
      margin: 0 auto 12px;
    }
    .sheet h3 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 18px;
    }

    .pad-display {
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.09);
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      padding: 6px 10px;
    }
    .pad-help {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      margin: 0 0 8px;
      line-height: 1.35;
    }
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .numkey {
      height: 42px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      background: rgba(255,255,255,0.09);
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      padding: 0;
    }
    .numkey.wide { grid-column: span 2; }
    .numkey.confirm { background: rgba(255,255,255,0.18); }

    .settings-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: min(68vh, 560px);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior: contain;
      padding-right: 2px;
      padding-bottom: 12px;
    }

    .setting-group {
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.08);
      padding: 12px;
    }
    .setting-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .setting-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="range"] {
      flex: 1;
      min-width: 170px;
      accent-color: #fff;
    }
    input[type="file"] {
      width: 100%;
      color: #fff;
      font-size: 14px;
    }

    .small-btn {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    .font-btn { min-width: 72px; text-align: center; }
    .font-btn.active {
      background: rgba(255,255,255,0.24);
      border-color: rgba(255,255,255,0.22);
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.88);
      font-size: 13px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: calc(var(--safe-bottom) + 120px);
      transform: translateX(-50%) translateY(14px);
      z-index: 20;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(25,25,25,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="phone" id="phone">
    <div class="bg-overlay"></div>

    <div class="topbar" id="topbar">
      <div id="carrier">台灣大哥大</div>
      <div class="status-right">
        <div class="signal"><span></span><span></span><span></span><span></span></div>
        <div>4G</div>
        <div class="battery">70</div>
      </div>
    </div>
    <div class="top-indicator" id="topIndicator"></div>

    <div class="content" id="contentArea">
      <div class="date" id="dateText"></div>
      <div class="time" id="timeText">00:00</div>
      <div class="hint" id="hintText">先用左下角輸入增加分鐘，再點畫面開始倒流</div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <button class="glass-btn" id="magicBtn" aria-label="輸入增加分鐘">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a2 2 0 0 1 2 2v3a5 5 0 0 1-2.03 4.03l-.54.4A3 3 0 0 0 15.2 13.8V20a2 2 0 0 1-2 2H10.8a2 2 0 0 1-2-2v-6.2a3 3 0 0 0-1.23-2.37l-.54-.4A5 5 0 0 1 5 7V4a2 2 0 0 1 2-2zm2 3v2h6V5H9zm3 7.2a1.8 1.8 0 1 0 0 3.6 1.8 1.8 0 0 0 0-3.6z"/></svg>
      </button>
      <button class="glass-btn" id="settingsBtn" aria-label="設定">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1h1.8a2.2 2.2 0 0 1 2.05 1.4l.32.82h.83A2 2 0 0 1 22 10.2v6.6A2.2 2.2 0 0 1 19.8 19H4.2A2.2 2.2 0 0 1 2 16.8v-6.6A2 2 0 0 1 4 8.2h.83l.32-.82A2.2 2.2 0 0 1 7.2 6H9V5zm3 3.2a4.3 4.3 0 1 0 0 8.6 4.3 4.3 0 0 0 0-8.6zm0 2a2.3 2.3 0 1 1 0 4.6 2.3 2.3 0 0 1 0-4.6z"/></svg>
      </button>
    </div>

    <div class="home-indicator" id="homeIndicator"></div>
    <div class="sheet-backdrop" id="backdrop"></div>

    <div class="sheet" id="numpadSheet">
      <div class="pad-display" id="padDisplay">0</div>
      <div class="pad-help">輸入要增加的分鐘數</div>
      <div class="numpad">
        <button class="numkey" data-key="1">1</button><button class="numkey" data-key="2">2</button><button class="numkey" data-key="3">3</button>
        <button class="numkey" data-key="4">4</button><button class="numkey" data-key="5">5</button><button class="numkey" data-key="6">6</button>
        <button class="numkey" data-key="7">7</button><button class="numkey" data-key="8">8</button><button class="numkey" data-key="9">9</button>
        <button class="numkey wide" data-key="clear">清除</button><button class="numkey" data-key="0">0</button><button class="numkey confirm" data-key="ok">確定</button>
      </div>
    </div>

    <div class="sheet" id="settingsSheet">
      <div class="grabber"></div>
      <h3>設定</h3>
      <div class="settings-body">
        <div class="setting-group">
          <div class="setting-label">背景圖片</div>
          <div class="setting-row">
            <input type="file" id="bgUpload" accept="image/*" />
            <button class="small-btn" id="resetBgBtn">恢復預設背景</button>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">倒流速度（1 秒退幾分鐘）</div>
          <div class="setting-row">
            <input type="range" id="speedRange" min="0.1" max="2" step="0.1" value="1" />
            <span class="status-chip"><span>⏱</span><span id="speedValue">1.0x</span></span>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">顯示選項</div>
          <div class="setting-row">
            <label class="status-chip"><input type="checkbox" id="liveClockToggle" checked />&nbsp;平常讀取現在時間</label>
            <label class="status-chip"><input type="checkbox" id="tapHintToggle" checked />&nbsp;顯示提示字</label>
            <label class="status-chip"><input type="checkbox" id="statusBarToggle" checked />&nbsp;顯示上方狀態列</label>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">時間格式</div>
          <div class="setting-row">
            <label class="status-chip"><input type="checkbox" id="hourFormatToggle" checked />&nbsp;24 小時制</label>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">時間樣式</div>
          <div class="setting-row">
            <button class="small-btn font-btn" data-style="glass">玻璃</button>
            <button class="small-btn font-btn" data-style="solid">不透明</button>
            <button class="small-btn font-btn" data-style="thin">細字</button>
            <button class="small-btn font-btn" data-style="lock">鎖屏</button>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">時間位置與大小</div>
          <div class="setting-row">
            <input type="range" id="timeSizeRange" min="88" max="180" step="2" value="132" />
            <span class="status-chip">大小 <span id="timeSizeValue">132</span></span>
          </div>
          <div class="setting-row" style="margin-top:8px;">
            <input type="range" id="timeOffsetRange" min="48" max="180" step="2" value="96" />
            <span class="status-chip">位置 <span id="timeOffsetValue">96</span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    const storageKey = 'ios-time-rewind-ui-v4';
    const defaultBackground = './UI.jpeg';
    const state = {
      addedMinutes: 0,
      displayMs: Date.now(),
      targetMs: Date.now(),
      fakeStartMs: null,
      rewinding: false,
      liveClock: true,
      showHint: true,
      showStatusBar: true,
      use24Hour: true,
      rewindSpeed: 1.0,
      timeSize: 132,
      timeOffset: 96,
      timeStyle: 'glass',
      backgroundData: null,
      numpadInput: '',
      toastTimer: null,
      currentPanel: null,
      rewindTimer: null,
      tickTimer: null
    };

    const phone = document.getElementById('phone');
    const contentArea = document.getElementById('contentArea');
    const dateText = document.getElementById('dateText');
    const timeText = document.getElementById('timeText');
    const hintText = document.getElementById('hintText');
    const topbar = document.getElementById('topbar');
    const topIndicator = document.getElementById('topIndicator');
    const magicBtn = document.getElementById('magicBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const backdrop = document.getElementById('backdrop');
    const numpadSheet = document.getElementById('numpadSheet');
    const settingsSheet = document.getElementById('settingsSheet');
    const padDisplay = document.getElementById('padDisplay');
    const toast = document.getElementById('toast');
    const bgUpload = document.getElementById('bgUpload');
    const resetBgBtn = document.getElementById('resetBgBtn');
    const speedRange = document.getElementById('speedRange');
    const speedValue = document.getElementById('speedValue');
    const liveClockToggle = document.getElementById('liveClockToggle');
    const tapHintToggle = document.getElementById('tapHintToggle');
    const statusBarToggle = document.getElementById('statusBarToggle');
    const hourFormatToggle = document.getElementById('hourFormatToggle');
    const timeSizeRange = document.getElementById('timeSizeRange');
    const timeOffsetRange = document.getElementById('timeOffsetRange');
    const timeSizeValue = document.getElementById('timeSizeValue');
    const timeOffsetValue = document.getElementById('timeOffsetValue');

    const weekdays = ['日','一','二','三','四','五','六'];
    const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

    function setAppHeight() {
      const h = window.innerHeight || document.documentElement.clientHeight || screen.height;
      document.documentElement.style.setProperty('--app-height', `${h}px`);
      phone.style.height = `${h}px`;
    }
    function preventGesture(e) { e.preventDefault(); }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify({
        liveClock: state.liveClock,
        showHint: state.showHint,
        showStatusBar: state.showStatusBar,
        use24Hour: state.use24Hour,
        rewindSpeed: state.rewindSpeed,
        timeSize: state.timeSize,
        timeOffset: state.timeOffset,
        timeStyle: state.timeStyle,
        backgroundData: state.backgroundData
      }));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (typeof saved.liveClock === 'boolean') state.liveClock = saved.liveClock;
        if (typeof saved.showHint === 'boolean') state.showHint = saved.showHint;
        if (typeof saved.showStatusBar === 'boolean') state.showStatusBar = saved.showStatusBar;
        if (typeof saved.use24Hour === 'boolean') state.use24Hour = saved.use24Hour;
        if (typeof saved.rewindSpeed === 'number') state.rewindSpeed = saved.rewindSpeed;
        if (typeof saved.timeSize === 'number') state.timeSize = saved.timeSize;
        if (typeof saved.timeOffset === 'number') state.timeOffset = saved.timeOffset;
        if (typeof saved.timeStyle === 'string') state.timeStyle = saved.timeStyle;
        if (typeof saved.backgroundData === 'string') state.backgroundData = saved.backgroundData;
      } catch (err) {
        console.warn('讀取設定失敗', err);
      }
    }

    function getFontButtons() { return Array.from(document.querySelectorAll('.font-btn')); }

    function applyTimeStyle(style) {
      state.timeStyle = style;
      timeText.style.webkitTextStroke = '0 transparent';
      if (style === 'glass') {
        timeText.style.color = 'rgba(255,255,255,0.72)';
        timeText.style.fontWeight = '700';
        timeText.style.letterSpacing = '-3px';
        timeText.style.textShadow = '0 2px 10px rgba(0,0,0,0.18)';
      } else if (style === 'solid') {
        timeText.style.color = 'rgba(255,255,255,0.97)';
        timeText.style.fontWeight = '800';
        timeText.style.letterSpacing = '-3px';
        timeText.style.textShadow = '0 3px 12px rgba(0,0,0,0.22)';
      } else if (style === 'thin') {
        timeText.style.color = 'rgba(255,255,255,0.88)';
        timeText.style.fontWeight = '300';
        timeText.style.letterSpacing = '-2px';
        timeText.style.textShadow = '0 2px 8px rgba(0,0,0,0.16)';
      } else {
        timeText.style.color = 'rgba(255,255,255,0.92)';
        timeText.style.fontWeight = '500';
        timeText.style.letterSpacing = '-4px';
        timeText.style.textShadow = '0 3px 14px rgba(0,0,0,0.2)';
      }
      getFontButtons().forEach(btn => btn.classList.toggle('active', btn.dataset.style === style));
    }

    function applySettingsToUI() {
      phone.style.backgroundImage = state.backgroundData ? `url(${state.backgroundData})` : `url(${defaultBackground})`;
      hintText.classList.toggle('show', state.showHint);
      topbar.style.display = state.showStatusBar ? 'flex' : 'none';
      topIndicator.style.display = state.showStatusBar ? 'block' : 'none';
      speedRange.value = String(state.rewindSpeed);
      speedValue.textContent = `${state.rewindSpeed.toFixed(1)}x`;
      liveClockToggle.checked = state.liveClock;
      tapHintToggle.checked = state.showHint;
      statusBarToggle.checked = state.showStatusBar;
      hourFormatToggle.checked = state.use24Hour;
      timeSizeRange.value = String(state.timeSize);
      timeOffsetRange.value = String(state.timeOffset);
      document.documentElement.style.setProperty('--time-size', `${state.timeSize}px`);
      document.documentElement.style.setProperty('--time-offset', `${state.timeOffset}px`);
      timeSizeValue.textContent = String(state.timeSize);
      timeOffsetValue.textContent = String(state.timeOffset);
      applyTimeStyle(state.timeStyle);
    }

    function showToast(message) {
      if (!state.showHint) return;
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function openPanel(name) {
      state.currentPanel = name;
      backdrop.classList.add('show');
      numpadSheet.classList.toggle('show', name === 'numpad');
      settingsSheet.classList.toggle('show', name === 'settings');
      if (name === 'numpad') padDisplay.textContent = state.numpadInput || '0';
    }

    function closePanels() {
      state.currentPanel = null;
      backdrop.classList.remove('show');
      numpadSheet.classList.remove('show');
      settingsSheet.classList.remove('show');
    }

    function formatTime(ms) {
      const d = new Date(ms);
      let hh = d.getHours();
      const mm = String(d.getMinutes()).padStart(2, '0');
      if (state.use24Hour) return `${String(hh).padStart(2, '0')}:${mm}`;
      hh = hh % 12;
      if (hh === 0) hh = 12;
      return `${hh}:${mm}`;
    }

    function getLunarYearText(d) {
      try {
        const fmt = new Intl.DateTimeFormat('zh-Hant-u-ca-chinese', { year: 'numeric' });
        const parts = fmt.formatToParts(d);
        const yearName = (parts.find(p => p.type === 'yearName') || {}).value;
        if (yearName) return `${yearName}年`;
      } catch (e) {}
      const stems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
      const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
      const baseYear = 1984;
      const diff = d.getFullYear() - baseYear;
      return `${stems[(diff % 10 + 10) % 10]}${branches[(diff % 12 + 12) % 12]}年`;
    }

    function getLunarText(d) {
      try {
        const fmt = new Intl.DateTimeFormat('zh-Hant-u-ca-chinese', { month: 'long', day: 'numeric' });
        const parts = fmt.formatToParts(d);
        let month = (parts.find(p => p.type === 'month') || {}).value || '二月';
        const dayValue = (parts.find(p => p.type === 'day') || {}).value || String(d.getDate());
        const dayNum = Number(dayValue);
        if (!month.includes('月')) month += '月';
        if (dayNum >= 1 && dayNum <= 30) return `${month}${lunarDays[dayNum - 1]}`;
        return `${month}${lunarDays[(d.getDate() - 1) % 30]}`;
      } catch (e) {
        return `二月${lunarDays[(d.getDate() - 1) % 30]}`;
      }
    }

    function formatDate(ms) {
      const d = new Date(ms);
      return `${d.getMonth() + 1}月${d.getDate()}日 週${weekdays[d.getDay()]} · ${getLunarYearText(d)}${getLunarText(d)}`;
    }

    function render() {
      dateText.textContent = formatDate(state.displayMs);
      timeText.textContent = formatTime(state.displayMs);
    }

    function syncNormalClock() {
      const now = Date.now();
      state.displayMs = now;
      state.targetMs = now;
      render();
    }

    function prepareFakeTime(minutes) {
      const now = Date.now();
      state.targetMs = now;
      state.fakeStartMs = now + minutes * 60000;
      state.displayMs = state.fakeStartMs;
      state.addedMinutes = minutes;
      render();
      showToast(`已增加 ${minutes} 分鐘`);
    }

    function stopRewind(done) {
      clearInterval(state.rewindTimer);
      state.rewindTimer = null;
      state.rewinding = false;
      state.addedMinutes = 0;
      state.fakeStartMs = null;
      if (done) showToast('倒流完成');
      render();
    }

    function startRewind() {
      if (state.rewinding) return;
      if (!state.fakeStartMs || state.displayMs <= state.targetMs) {
        showToast('請先用左下角輸入分鐘數');
        return;
      }
      closePanels();
      state.rewinding = true;
      showToast('開始倒流');
      state.rewindTimer = setInterval(() => {
        state.displayMs -= 60000 * state.rewindSpeed;
        if (state.displayMs <= state.targetMs) {
          state.displayMs = state.targetMs;
          stopRewind(true);
          return;
        }
        render();
      }, 1000);
    }

    function mainTick() {
      if (state.rewinding) return;
      if (!state.fakeStartMs && state.liveClock) syncNormalClock();
      else render();
    }

    magicBtn.addEventListener('click', () => {
      state.numpadInput = state.addedMinutes > 0 ? String(state.addedMinutes) : '';
      openPanel('numpad');
    });
    settingsBtn.addEventListener('click', () => openPanel('settings'));
    backdrop.addEventListener('click', closePanels);

    contentArea.addEventListener('click', () => {
      if (state.currentPanel || state.rewinding) return;
      startRewind();
    });

    numpadSheet.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-key]');
      if (!btn) return;
      const key = btn.dataset.key;
      if (key === 'clear') state.numpadInput = '';
      else if (key === 'ok') {
        const value = Number(state.numpadInput || '0');
        closePanels();
        if (value <= 0) {
          showToast('請輸入大於 0 的分鐘數');
          return;
        }
        if (state.rewinding) stopRewind(false);
        prepareFakeTime(value);
        return;
      } else if (state.numpadInput.length < 4) {
        state.numpadInput += key;
      }
      padDisplay.textContent = state.numpadInput || '0';
    });

    speedRange.addEventListener('input', () => {
      state.rewindSpeed = Number(speedRange.value);
      speedValue.textContent = `${state.rewindSpeed.toFixed(1)}x`;
      saveState();
    });
    speedRange.addEventListener('change', closePanels);

    liveClockToggle.addEventListener('change', () => {
      state.liveClock = liveClockToggle.checked;
      if (!state.fakeStartMs && state.liveClock) syncNormalClock();
      saveState();
      closePanels();
    });
    tapHintToggle.addEventListener('change', () => {
      state.showHint = tapHintToggle.checked;
      hintText.classList.toggle('show', state.showHint);
      toast.classList.remove('show');
      saveState();
      closePanels();
    });
    statusBarToggle.addEventListener('change', () => {
      state.showStatusBar = statusBarToggle.checked;
      topbar.style.display = state.showStatusBar ? 'flex' : 'none';
      topIndicator.style.display = state.showStatusBar ? 'block' : 'none';
      saveState();
      closePanels();
    });
    hourFormatToggle.addEventListener('change', () => {
      state.use24Hour = hourFormatToggle.checked;
      render();
      saveState();
      closePanels();
    });

    timeSizeRange.addEventListener('input', () => {
      state.timeSize = Number(timeSizeRange.value);
      document.documentElement.style.setProperty('--time-size', `${state.timeSize}px`);
      timeSizeValue.textContent = String(state.timeSize);
      saveState();
    });
    timeOffsetRange.addEventListener('input', () => {
      state.timeOffset = Number(timeOffsetRange.value);
      document.documentElement.style.setProperty('--time-offset', `${state.timeOffset}px`);
      timeOffsetValue.textContent = String(state.timeOffset);
      saveState();
    });

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.font-btn');
      if (!btn) return;
      applyTimeStyle(btn.dataset.style);
      saveState();
      closePanels();
    });

    bgUpload.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.backgroundData = reader.result;
        applySettingsToUI();
        saveState();
        closePanels();
        showToast('背景已更新');
      };
      reader.readAsDataURL(file);
    });
    resetBgBtn.addEventListener('click', () => {
      state.backgroundData = null;
      applySettingsToUI();
      saveState();
      closePanels();
      showToast('已恢復預設背景');
    });

    document.addEventListener('keydown', (e) => {
      if (state.currentPanel !== 'numpad') return;
      if (/^[0-9]$/.test(e.key)) {
        if (state.numpadInput.length < 4) state.numpadInput += e.key;
      } else if (e.key === 'Backspace') {
        state.numpadInput = state.numpadInput.slice(0, -1);
      } else if (e.key === 'Enter') {
        const value = Number(state.numpadInput || '0');
        closePanels();
        if (value > 0) prepareFakeTime(value);
      }
      padDisplay.textContent = state.numpadInput || '0';
    });

    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', setAppHeight);
    document.addEventListener('gesturestart', preventGesture, { passive: false });
    document.addEventListener('gesturechange', preventGesture, { passive: false });
    document.addEventListener('gestureend', preventGesture, { passive: false });
    document.addEventListener('touchmove', (e) => {
      if (e.target.closest('.settings-body')) return;
      preventGesture(e);
    }, { passive: false });

    loadState();
    setAppHeight();
    applySettingsToUI();
    syncNormalClock();
    state.tickTimer = setInterval(mainTick, 1000);
  </script>
</body>
</html>
